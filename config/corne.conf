# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Uncomment the following line to enable the Corne OLED Display
# CONFIG_ZMK_DISPLAY=y

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Bluetooth host-pairing reliability.
# EXPERIMENTAL_CONN: connection-stability tweaks + disables the 2M PHY (helps
# Windows/Intel & Intel-Mac radios). Used by known-good XIAO dongle configs.
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_CTLR_PHY_2M=n

# Require passkey entry to complete pairing. ZMK's default "Just Works"
# (unauthenticated) pairing is rejected by some macOS/Windows hosts for a HID
# keyboard, which shows up as "spins, then Connection Failed" during pairing.
# Authenticated passkey pairing fixes that. During pairing the host displays 6
# digits — type them on the keyboard and press Enter to finish.
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y

# sleep settings
# currently set to 30 mins
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

CONFIG_ZMK_KEYBOARD_NAME="CorneKBH"
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_POINTING=y

# USB HID through a KVM switch.
# KVMs (and many BIOS/UEFI + Windows/Linux hosts) speak the HID *boot protocol*,
# but ZMK defaults to report protocol with Report IDs, so a KVM's HID port
# ignores every keystroke. Enable real boot-protocol support and force the
# boot-compatible 6-key report type (HKRO) instead of NKRO's bitmap format.
# Trade-off: max 6 simultaneous keys and no F13-F24 / INTL usages.
CONFIG_ZMK_USB_BOOT=y
CONFIG_ZMK_HID_REPORT_TYPE_HKRO=y

# Enable eager debouncing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=7

# ---------------------------------------------------------------------------
# Prospector display settings (applied to the dongle build via name matching)
# ---------------------------------------------------------------------------
# This board has NO APDS9960 ambient-light sensor, so auto-brightness is off
# and the fixed brightness below (1-100) is used instead.
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=n
CONFIG_PROSPECTOR_FIXED_BRIGHTNESS=80
CONFIG_PROSPECTOR_ROTATE_DISPLAY_180=n
CONFIG_PROSPECTOR_LAYER_ROLLER_ALL_CAPS=n
